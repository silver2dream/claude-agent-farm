apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: claude-agents
  labels:
    app: dashboard
    app.kubernetes.io/part-of: claude-agent-farm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: shared-projects
              mountPath: /data/projects
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dashboard-config
        - name: shared-projects
          hostPath:
            path: /data/game-studio-projects
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: claude-agents
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
