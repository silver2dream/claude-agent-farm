apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: example-agent-claude-data
  namespace: claude-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-agent
  namespace: claude-agents
  labels:
    app.kubernetes.io/part-of: claude-agent-farm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-agent
  template:
    metadata:
      labels:
        app: example-agent
    spec:
      containers:
        - name: claude-code
          image: claude-agent:latest
          imagePullPolicy: Never
          tty: true
          stdin: true
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot-token
                  key: DISCORD_BOT_TOKEN
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: claude-data
              mountPath: /home/agent/.claude
            - name: claude-credentials
              mountPath: /secrets/claude-config
              readOnly: true
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "claude"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: claude-data
          persistentVolumeClaim:
            claimName: example-agent-claude-data
        - name: claude-credentials
          secret:
            secretName: claude-config
            optional: true
