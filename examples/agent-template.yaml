apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: __AGENT_NAME__-claude-data
  namespace: claude-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __AGENT_NAME__
  namespace: claude-agents
  labels:
    app.kubernetes.io/part-of: claude-agent-farm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __AGENT_NAME__
  template:
    metadata:
      labels:
        app: __AGENT_NAME__
    spec:
      containers:
        - name: claude-code
          image: __IMAGE__
          imagePullPolicy: Never
          tty: true
          stdin: true
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot-__AGENT_NAME__
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_USER_ID
              valueFrom:
                secretKeyRef:
                  name: discord-shared
                  key: DISCORD_USER_ID
            - name: DISCORD_CHANNEL_ID
              value: "__CHANNEL_ID__"
            - name: AGENT_SYSTEM_PROMPT
              value: "__SYSTEM_PROMPT__"
            - name: REQUIRE_MENTION
              value: "__REQUIRE_MENTION__"
            - name: ORCHESTRATOR_BOT_ID
              value: "1485208546579710003"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: claude-data
              mountPath: /home/agent/.claude
            - name: claude-credentials
              mountPath: /secrets/claude-config
              readOnly: true
            - name: shared-projects
              mountPath: /home/agent/workspace/projects
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "claude"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: claude-data
          persistentVolumeClaim:
            claimName: __AGENT_NAME__-claude-data
        - name: claude-credentials
          secret:
            secretName: claude-config
            optional: true
        - name: shared-projects
          hostPath:
            path: /data/game-studio-projects
            type: DirectoryOrCreate
